name: Create Nightly Package

on:
  create:

jobs:
  is_nightly:
    if: contains(github.ref, 'nightly') == true
    runs-on: ubuntu-latest

    steps:
      - name: Check
        run: echo ${{ github.ref }}

  package:
    needs: is_nightly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove Changelog
        run: rm -f CHANGELOG.md

      - name: Create Nightly Package
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_EXTERNAL_ADDONS: "yes"
          AURORA_NIGHTLY: "yes"
        run: |
          sudo apt-get install pandoc subversion
          curl -s https://raw.githubusercontent.com/RealUI/packager/RealUI/release.sh -o release.sh
          bash release.sh -L -p 88269
        # No CF_API_KEY, WAGO_API_KEY, or WOWI_API_TOKEN — GitHub release only
        # AURORA_NIGHTLY=yes: prefers Aurora nightly over latest release when newer

      - name: Mark as pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF#refs/tags/}" --prerelease --repo "$GITHUB_REPOSITORY"
