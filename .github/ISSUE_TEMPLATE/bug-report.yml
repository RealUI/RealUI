name: Bug report
description: Create a report to help us improve RealUI
title: "[Bug] "
labels: bug
assignees: arnvid

body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: Please search to see if an issue already exists for the bug you encountered.
    options:
    - label: I have searched the existing issues
      required: true
    - label: I am running the latest release of RealUI
      required: true

- type: dropdown
  attributes:
    label: Game Client
    description: Which WoW client are you running RealUI on?
    options:
      - Retail (Mainline)
      - Beta
      - PTR
  validations:
    required: true

- type: input
  attributes:
    label: WoW Interface Version
    description: Found in-game under Help → About, or in any `.toc` file header.
    placeholder: "e.g. 110107"
  validations:
    required: true

- type: input
  attributes:
    label: RealUI Version
    description: Found in the `RealUI.toc` file or on the WoWInterface/GitHub/Wago release page.
    placeholder: "e.g. 3.1.0"
  validations:
    required: true

- type: input
  attributes:
    label: Aurora Version
    description: Found in `Aurora_Mainline.toc`. RealUI embeds Aurora via RealUI_Skins.
    placeholder: "e.g. 9.0.0"
  validations:
    required: true

- type: textarea
  attributes:
    label: Current Behavior
    description: A concise description of what you're experiencing.
  validations:
    required: true

- type: textarea
  attributes:
    label: Expected Behavior
    description: A concise description of what you expected to happen.
  validations:
    required: true

- type: textarea
  attributes:
    label: Steps To Reproduce
    description: Steps to reproduce the behavior.
    placeholder: |
      1. Go to '...'
      2. Click on '....'
      3. Scroll down to '....'
      4. See error
  validations:
    required: true

- type: textarea
  attributes:
    label: Error Output
    description: |
      If you received a Lua error, paste the full text here. Use BugSack / !BugGrabber to capture it accurately.
    render: lua
    placeholder: |
      Message: Interface\AddOns\RealUI\...
      ...

- type: checkboxes
  attributes:
    label: Reproducibility
    options:
    - label: Problem can be reliably reproduced (not random)
    - label: Problem started happening recently — it did not occur in an older version

- type: textarea
  attributes:
    label: Other Active Addons
    description: List any non-RealUI addons that are active. Helps rule out conflicts.
    placeholder: |
      - Masque 10.2.0
      - Bartender4 4.13.0
      - WeakAuras 5.x

- type: textarea
  attributes:
    label: Additional Context
    description: Add any other context, screenshots, or video recordings here.
